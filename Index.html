<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Sayuri 💖</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
}
.container{
    margin-top:80px;
    padding:20px;
}
h1{
    font-size:40px;
}
p{
    font-size:22px;
    max-width:600px;
    margin:auto;
}
button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4b6e;
    margin-top:30px;
}
.corazon{
    font-size:60px;
    display:none;
}
</style>
</head>

<body>
<div class="container">
    <h1>Sayuri 💕</h1>
    <p>
    Quiero recordarte que eres muy valiosa,
    que mereces todo lo bonito del mundo
    y que siempre estaré contigo.
    </p>

    <button onclick="mostrar()">Tócame 💗</button>

    <div id="heart" class="corazon">❤️ Te quiero muchísimo ❤️</div>
</div>

<script>
function mostrar(){
    document.getElementById("heart").style.display="block";
}
</script>
</body>
</html>
