<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas para Sayuri 💖</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#ffd6e7,#ffeaf4);
  text-align:center;
  padding:40px;
}

h1{
  color:#ff4d88;
}

button{
  padding:15px 25px;
  margin:10px;
  border:none;
  border-radius:15px;
  font-size:18px;
  background:#ff4d88;
  color:white;
}

input{
  padding:10px;
  font-size:18px;
  border-radius:10px;
  border:1px solid gray;
}

.carta{
  background:white;
  padding:25px;
  border-radius:20px;
  margin-top:25px;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h1 id="titulo">Estas cartas son para ti Sayuri 💌</h1>

<button onclick="carta1()">Carta 1 💖</button>
<button onclick="pedirClave(2)">Carta 2 🔒</button>
<button onclick="pedirClave(3)">Carta 3 🔒</button>

<div id="contenido"></div>

<script>
let desbloqueada2=false;

function carta1(){
document.getElementById("contenido").innerHTML=
"<div class='carta'>"+
"<h2>Carta 1 💖</h2>"+
"<p>Te quiero muchísimo Sayuri 💖</p>"+
"<br><b>Postdata: la contraseña es: tequiero</b>"+
"</div>";
}

function pedirClave(num){
document.getElementById("contenido").innerHTML=
"<div class='carta'>"+
"<h2>Introduce la contraseña 🔐</h2>"+
"<input id='clave'><br><br>"+
"<button onclick='verificar("+num+")'>Entrar</button>"+
"</div>";
}

function verificar(num){
let clave=document.getElementById("clave").value;

if(num==2 && clave=="tequiero"){
desbloqueada2=true;
document.getElementById("contenido").innerHTML=
"<div class='carta'><h2>Carta 2 💌</h2><p>Mensaje secreto desbloqueado 💖</p></div>";
}
else if(num==3 && desbloqueada2 && clave!=""){
document.getElementById("contenido").innerHTML=
"<div class='carta'><h2>Carta 3 💌</h2><p>Última carta desbloqueada 💖</p></div>";
}
else{
document.getElementById("contenido").innerHTML=
"<div class='carta'><h2>Contraseña incorrecta 😢</h2></div>";
}
}
</script>

</body>
</html>
