<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartas para Sayuri</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#ffe6f0;
padding:30px;
}

h1{
font-size:40px;
}

button{
font-size:28px;
padding:15px 30px;
margin:15px;
border:none;
border-radius:15px;
background:#ff66a3;
color:white;
}

input{
font-size:25px;
padding:10px;
border-radius:10px;
border:1px solid gray;
}

#texto{
font-size:26px;
max-width:800px;
margin:auto;
}
</style>

</head>

<body>

<h1 id="texto">Estas cartas son para ti Sayuri 💖</h1>

<button onclick="carta1()">💌 Carta 1</button>
<button onclick="carta2()">🔒 Carta 2</button>
<button onclick="carta3()">🔒 Carta 3</button>

<div id="extra"></div>

<script>
let desbloqueo2 = false;
let desbloqueo3 = false;

function carta1(){
document.getElementById("texto").innerHTML =
`Hola que tal bueno hoy bueno mañana cumplimos un mes mas de amistad y pues quiero agradecerte.<br><br>

Agradecerte por estar a mi lado en momentos difíciles, agradecerte por soportarme en mis locuras, agradecerte por quedarte a mi lado.<br><br>

Te agradezco mucho Sayuri 💖<br><br>

<b>Postdata: la contraseña de la segunda carta es: te agradezco</b>`;
document.getElementById("extra").innerHTML="";
desbloqueo2 = true;
}

function carta2(){
if(!desbloqueo2){
document.getElementById("texto").innerHTML="Primero lee la carta 1 💖";
return;
}
document.getElementById("texto").innerHTML="Introduce la contraseña 🔐";
document.getElementById("extra").innerHTML =
'<input id="clave"><br><br><button onclick="verificar2()">Abrir carta</button>';
}

function verificar2(){
var clave=document.getElementById("clave").value;
if(clave=="te agradezco"){
document.getElementById("texto").innerHTML =
"Carta 2 desbloqueada 💖";
document.getElementById("extra").innerHTML="";
desbloqueo3 = true;
}else{
document.getElementById("texto").innerHTML="Contraseña incorrecta 😢";
}
}

function carta3(){
if(!desbloqueo3){
document.getElementById("texto").innerHTML="Primero desbloquea la carta 2 😉";
return;
}
document.getElementById("texto").innerHTML="Carta 3 desbloqueada 💖";
document.getElementById("extra").innerHTML="";
}
</script>

</body>
</html>
