<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartas para Sayuri</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#ffe6f0;
padding:30px;
}
h1{font-size:40px;}
button{
font-size:26px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:15px;
background:#ff66a3;
color:white;
}
input{
font-size:22px;
padding:10px;
border-radius:10px;
border:1px solid gray;
}
#texto{
font-size:26px;
max-width:800px;
margin:auto;
}
</style>

</head>

<body>

<h1 id="texto">Estas cartas son para ti Sayuri 💖</h1>

<button onclick="carta1()">💌 Carta 1</button>
<button onclick="carta2()">🔒 Carta 2</button>
<button onclick="carta3()">🔒 Carta 3</button>

<div id="extra"></div>

<script>

let desbloqueo2=false;
let desbloqueo3=false;

// ✏️ AQUI PEGARAS LA CARTA 2
let carta2Texto = `
bueno aqui en ma segunda carta sera algo un poco mas corto pero weno juas juas.

queria decirte que como te venia diciendo dias pasados vales mucho. Aunque hallas tenido personas en tu vida que te hivieron daño
no tienes porque cambiar tu forma de ser,no tienes que dejar de ser tu misma porque el que se aleja realmente conociendote es porque simplemente no merecia tu cariño y amor
y me incluyo un poco porque osea si me duele un poquito que te escribo y ya no respondes como antes y pues si extraño esos dias donde nos quedabamos hablando por horas,pero como se como eres no me preocupo tanto al respecto porque se que ahi estas y por eso te quiero amiguita :).<br><br>

<b>Postdata: la contraseña de la carta 3 es: te quiero<b>
`;

// ✏️ AQUI PEGARAS LA CARTA 3
let carta3Texto = `
Bueno ya estás aquí en la última carta 💌<br><br>

Ya te dije cuánto vales y cuánto te agradezco… ahora falta decirte cuánto te quiero.<br><br>

Aunque apenas son 2 meses, tú le devolviste el brillo a mis ojos. Te quiero por eso, por sacarme del vacío que tenía en el pecho. Estaba tratando de evitar lo que sentía, pero ya no pude… lo que empezó a nacer en mí es amor.<br><br>

Nunca he tenido pareja, pero sí sé lo que es enamorarse… y me enamoré de ti. Tal vez pienses que no te merezco, pero créeme que tú sí me mereces a mí. No me importan tus defectos, los que tienes, los que no conozco o los que puedas llegar a tener. Si todos fuéramos perfectos no haría falta buscar a alguien en esta vida.<br><br>

Me cautivó tu forma de ser, no tu cuerpo ni tu cara. He conocido chicas muy guapas y nunca me fijé en ellas… porque yo buscaba a alguien único como tú. Me encantan tus locuras, tu risa, tu voz… me encanta todo de ti.<br><br>

Sé que estás pasando por cosas difíciles, pero quiero ayudarte a olvidar a quienes no supieron valorarte. Te prometo que nunca te haría daño. He tenido que madurar desde niño y estoy cambiando, no solo por ti, también por mí.<br><br>

Le pedí a Dios que pusiera a alguien en mi camino para sanar… y me dio a ti. Primero te quise muchísimo como amiga… pero terminé enamorándome. Tengo miedo de lo que pueda pasar, pero aun así quiero intentarlo contigo.<br><br>

Te hice una playlist con canciones que representan lo que siento por ti 🎶<br>
👉 https://open.spotify.com/playlist/3SzUAolBDeQ7WGYnsV1xU3<br><br>

Cada canción tiene un significado de lo que siento hacia ti 💖<br><br>

Y quiero terminar con una pregunta muy sincera…<br><br>

<b>¿Quisieras intentarlo?</b>
`;

function carta1(){
document.getElementById("texto").innerHTML = `
Hola que tal bueno hoy bueno mañana cumplimos un mes mas de amistad y pues quiero agradecerte.

Agradecerte por estar a mi lado en momentos difíciles,agradecerte por soportarme en mis locuras,agradecerte por quedarte a mi lado. Y te preguntarás porque este baboso me agradece y pues es una historia que te resumiré pero te contaré.
Me hicieron daño si te conté sobro de mi ex mejor amiga que me dejo así sin mas pues bueno fue eso y tu dirás pero es una amiga,pero realmente soy muy sentimental y me dejo echo MIERDA,pensé que fue mi culpa,me echaba la culpa me repetía que era una persona horrible,una mierda,una basura,que me merecía ese dolor por ser mala persona.
Seguido de eso apareció la academia de la municipalidad y pues no sabía si entrar a la unt con una carrera que realmente no me gustaba pero tuve tanta presión por parte de mi madre que decidí intentarlo y pues yo iba a estudiar pero por Fabián que también le agradezco de cierta manera nos conocimos y formamos un grupito aunque no era de hablar mucho aunque tiempo después tu y yo no hicimos muy buenos amigos. Esa es la razón por la que te agradezco porque me hiciste y haces olvidarme los malos ratos y problemas que tenga y de echo gracias a eso decidí plantarme con mi mamá para decirle que no quería estudiar en la unt y ahora comenzaré a estudiar lo que me gusta te agradezco mucho Sayuri.<br><br>

<b>Postdata: contraseña carta 2 → te agradezco</b>
`;
document.getElementById("extra").innerHTML="";
desbloqueo2=true;
}

function carta2(){
if(!desbloqueo2){
document.getElementById("texto").innerHTML="Primero lee la carta 1 💖";
return;
}
document.getElementById("texto").innerHTML="Introduce contraseña:";
document.getElementById("extra").innerHTML=
'<input id="clave2"><br><br><button onclick="verificar2()">Abrir carta 2</button>';
}

function verificar2(){
if(document.getElementById("clave2").value=="te agradezco"){
document.getElementById("texto").innerHTML=carta2Texto;
document.getElementById("extra").innerHTML="";
desbloqueo3=true;
}else{
document.getElementById("texto").innerHTML="Contraseña incorrecta 😢";
}
}

function carta3(){
if(!desbloqueo3){
document.getElementById("texto").innerHTML="Primero abre la carta 2 😉";
return;
}
document.getElementById("texto").innerHTML="Introduce contraseña carta 3:";
document.getElementById("extra").innerHTML=
'<input id="clave3"><br><br><button onclick="verificar3()">Abrir carta 3</button>';
}

function verificar3(){
if(document.getElementById("clave3").value=="te quiero"){
document.getElementById("texto").innerHTML=carta3Texto;
document.getElementById("extra").innerHTML="";
}else{
document.getElementById("texto").innerHTML="Contraseña incorrecta 😢";
}
}

</script>

</body>
</html>
