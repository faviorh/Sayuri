<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartas para Sayuri</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#ffe6f0;
padding:30px;
}
h1{font-size:40px;}
button{
font-size:26px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:15px;
background:#ff66a3;
color:white;
}
input{
font-size:22px;
padding:10px;
border-radius:10px;
border:1px solid gray;
}
#texto{
font-size:26px;
max-width:800px;
margin:auto;
}
</style>

</head>

<body>

<h1 id="texto">Estas cartas son para ti Sayuri 💖</h1>

<button onclick="carta1()">💌 Carta 1</button>
<button onclick="carta2()">🔒 Carta 2</button>
<button onclick="carta3()">🔒 Carta 3</button>

<div id="extra"></div>

<script>

let desbloqueo2=false;
let desbloqueo3=false;

// ✏️ AQUI PEGARAS LA CARTA 2
let carta2Texto = `
AQUI ES DONDE PEGARAS LA CARTA 2 💖
`;

// ✏️ AQUI PEGARAS LA CARTA 3
let carta3Texto = `
AQUI ES DONDE PEGARAS LA CARTA 3 💖
`;

function carta1(){
document.getElementById("texto").innerHTML = `
Hola que tal bueno mañana cumplimos un mes más de amistad y quiero agradecerte 💖<br><br>
<b>Postdata: contraseña carta 2 → te agradezco</b>
`;
document.getElementById("extra").innerHTML="";
desbloqueo2=true;
}

function carta2(){
if(!desbloqueo2){
document.getElementById("texto").innerHTML="Primero lee la carta 1 💖";
return;
}
document.getElementById("texto").innerHTML="Introduce contraseña:";
document.getElementById("extra").innerHTML=
'<input id="clave2"><br><br><button onclick="verificar2()">Abrir carta 2</button>';
}

function verificar2(){
if(document.getElementById("clave2").value=="te agradezco"){
document.getElementById("texto").innerHTML=carta2Texto;
document.getElementById("extra").innerHTML="";
desbloqueo3=true;
}else{
document.getElementById("texto").innerHTML="Contraseña incorrecta 😢";
}
}

function carta3(){
if(!desbloqueo3){
document.getElementById("texto").innerHTML="Primero abre la carta 2 😉";
return;
}
document.getElementById("texto").innerHTML="Introduce contraseña carta 3:";
document.getElementById("extra").innerHTML=
'<input id="clave3"><br><br><button onclick="verificar3()">Abrir carta 3</button>';
}

function verificar3(){
if(document.getElementById("clave3").value=="te quiero"){
document.getElementById("texto").innerHTML=carta3Texto;
document.getElementById("extra").innerHTML="";
}else{
document.getElementById("texto").innerHTML="Contraseña incorrecta 😢";
}
}

</script>

</body>
</html>
